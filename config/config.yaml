  google_trends:
    enabled: true
    provider: serpapi             # paid API is the PRIMARY path — pytrends dropped (plan item 12)
    anchor_query: "weather"       # fixed anchor for cross-day normalization
    cost_per_search_usd: 0.01
    # Developer tier (5,000/mo) since 15.07 — per-category seeds, ~15/day (item 59/75)
    seed_queries:
      - "tiktok made me buy it"
      - "amazon finds"
      - "trending gadget"
      - "kitchen gadget"
      - "home decor trend"
      - "skincare trend"
      - "makeup dupe"
      - "viral snack"
      - "new energy drink"
      - "trending toy"
      - "viral water bottle"
      - "workout trend"
      - "supplement trend"
      - "trending sneakers"
      - "pet gadget"

  amazon:
    enabled: true
    provider: keepa
    domain: 1                     # 1 = amazon.com
    categories:                   # Amazon US browse-node ids
      - 1055398                   # Home & Kitchen
      - 165793011                 # Toys & Games
      - 3760911                   # Beauty & Personal Care
      - 3375251                   # Sports & Outdoors
      - 16310101                  # Grocery & Gourmet Food
      - 3760901                   # Health & Household
    cost_per_token_usd: 0.0005

  tiktok:
    enabled: true
    provider: apify                 # doliz creative-center actor, per-industry (item 60)
    hashtags_limit: 20              # actor max
    period_days: 7
    country: US
    cost_per_run_usd: 0.05          # ~8 industry runs/day ≈ $0.40/day
    # industries: override DEFAULT_INDUSTRIES in collectors/tiktok.py if needed

  sec_edgar:
    enabled: true                 # free official API, no key (plan item 35)
    forms: ["8-K", "10-K", "10-Q"]
    lookback_days: 30
    max_queries: 40               # widened 15.07 (breadth, item 75)

  gdelt:
    enabled: true                 # free news volume, no key (plan item 37)
    timespan_days: 90             # one call returns the full daily timeline
    max_queries: 40               # widened 15.07 (breadth, item 75)

  youtube:
    enabled: true                 # plan item 38 — free, 10k quota units/day
    lookback_days: 14
    max_queries: 30               # 30 × 100 units = 3,000/day, safe margin

  research:
    enabled: true                 # plan item 36 — free RSS; Gartner blocks bots, skipped
    lookback_days: 14
    max_per_feed: 15
    feeds:
      - { name: ark-invest, url: "https://ark-invest.com/feed/" }
      - { name: cb-insights, url: "https://www.cbinsights.com/research/feed/" }
      - { name: mckinsey, url: "https://www.mckinsey.com/insights/rss" }

signals:
  min_mentions_threshold: 3       # entity must clear this before entering anomaly math (plan item 17)

anomalies:
  poisson_p_threshold: 0.001      # plan item 20 — Poisson tail probability, not naive z-score
  source_weights:                 # plan item 40 — reliability weight multiplies anomaly scores
    tiktok: 1.0
    google_trends: 0.9            # rising-query seeds can be noisy
    reddit: 1.0
    amazon: 1.1                   # purchase behavior > chatter
    sec_edgar: 1.2                # corporate filings = highest-conviction mentions
    gdelt: 0.7                    # news volume is broad and noisy
    research: 1.1
    tiktok_curve: 1.0
    google_trends_interest: 0.9
    youtube: 1.0
  acceleration_ratio: 2.0         # velocity must double week-over-week
  cross_source_window_days: 14    # plan item 21 — sources lag each other; not simultaneity
  cross_source_bonus: 2.0
  sequence_bonus: 1.25            # plan item 61 — leading source fired before lagging
  new_entity_window_days: 7
  new_entity_min_mentions: 5
  new_entity_min_sources: 2

reports:
  dashboard_url: "https://trend-engine-dashboard.vercel.app"  # deep links (item 69)
  email_to: mkurant@bkonect.com
  telegram_enabled: true
  language: en                    # plan item 33 — changed 2026-07-15: English everywhere
  daily_top_n: 5                  # plan item 30
  weekly_day: 0                   # 0 = Monday — weekly report day (plan item 32)

alerts:                           # plan item 31 — deliberately high threshold
  min_score: 90                   # only cross-source surges at/above this alert
  watchlist_min_score: 60         # plan item 43 — watched trends alert earlier
