  * { box-sizing: border-box; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .chip { border: 1px solid var(--line); background: transparent; color: var(--ink);

  .phase-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .phase-head h2 { font-size: 1.02rem; margin: 0; }
  .phase-head .weeks { color: var(--muted); font-size: .78rem; }
  .phase-head .mini { flex: 1; max-width: 140px; height: 6px; border-radius: 3px;
                      background: var(--line); overflow: hidden; }
  .phase-head .mini i { display: block; height: 100%; background: var(--accent); }
  .phase-head .mini-lbl { color: var(--muted); font-size: .75rem; }

  .items { background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
           box-shadow: var(--shadow); overflow: hidden; }
  .item { display: grid; grid-template-columns: 44px 1fr 190px 118px;
          gap: 6px 14px; padding: 11px 14px; border-top: 1px solid var(--line);
          align-items: start; }
  .item:first-child { border-top: 0; }
  .item .num { color: var(--num); font-weight: 600; padding-top: 1px; }
  .item .title { font-weight: 600; }
  .item .desc { color: var(--muted); font-size: .84rem; margin-top: 2px; }
  .item .note { font-size: .84rem; margin-top: 3px; color: var(--ink); }
  .item .note::before { content: "↩ "; color: var(--accent); }
  .item .wait { font-size: .82rem; color: var(--muted); padding-top: 2px; }
  .item .wait b { color: var(--ink); font-weight: 600; }
  .status { justify-self: start; font-size: .78rem; font-weight: 600; border-radius: 999px;

  .hidden { display: none; }

  footer { color: var(--muted); font-size: .78rem; margin-top: 30px; }

    .item .wait { grid-column: 2; }

  }

  const bar = document.getElementById("bar");
  bar.innerHTML = "";
  for (const k of ["tested","done","partial","key","ext","todo"]) {
    const s = document.createElement("span");
    s.style.width = (100 * counts[k] / ITEMS.length) + "%";
    s.style.background = STATUSES[k].color;
    if (k === "todo") s.style.opacity = ".35";
    bar.appendChild(s);
  }

  const chips = document.getElementById("chips");
  chips.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip"; all.setAttribute("aria-pressed", filter === null);
  all.innerHTML = `הכל <span class="n mono">${ITEMS.length}</span>`;
  all.onclick = () => { filter = null; render(); };
  chips.appendChild(all);
  for (const k of ["tested","done","partial","key","ext","todo"]) {
    const b = document.createElement("button");
    b.className = "chip"; b.setAttribute("aria-pressed", filter === k);
    b.innerHTML = `<span class="dot" style="background:${STATUSES[k].color}"></span>
                   ${STATUSES[k].label} <span class="n mono">${counts[k]}</span>`;
    b.onclick = () => { filter = (filter === k ? null : k); render(); };
    chips.appendChild(b);
  }

  // phases
  const main = document.getElementById("phases");
  main.innerHTML = "";
  for (const ph of PHASES) {
    const items = ITEMS.filter(i => i.p === ph.id);
    const shown = items.filter(i => !filter || i.s === filter);
    if (filter && shown.length === 0) continue;
    const w = items.reduce((a, i) => a + STATUSES[i.s].weight, 0);
    const phPct = Math.round(100 * w / items.length);

    const sec = document.createElement("section");
    sec.className = "phase";
    sec.innerHTML = `
      <div class="phase-head">
        <h2>${ph.title}</h2>
        <span class="weeks">${ph.weeks}</span>
        <span class="mini"><i style="width:${phPct}%"></i></span>
        <span class="mini-lbl mono">${phPct}%</span>
      </div>`;
    const list = document.createElement("div");
    list.className = "items";
    for (const it of items) {
      const hide = filter && it.s !== filter;
      const st = STATUSES[it.s];
      const row = document.createElement("div");
      row.className = "item" + (hide ? " hidden" : "") + (it.s === "todo" ? " dim" : "");
      row.innerHTML = `
        <div class="num mono">${it.n}</div>
        <div>
          <div class="title">${it.t}</div>
          ${it.d ? `<div class="desc">${it.d}</div>` : ""}
          ${it.note ? `<div class="note">${it.note}</div>` : ""}
        </div>
        <div class="wait">${it.w ? `⏳ מחכה ל: <b>${it.w}</b>` : ""}</div>
        <div class="status" style="--sc:${st.color}">${st.label}</div>`;
      list.appendChild(row);
    }
    sec.appendChild(list);
    main.appendChild(sec);
  }
}
render();
</script>
