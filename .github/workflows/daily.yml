# Daily collection run (plan item 7).
# GitHub Actions is the orchestrator for API calls only — no direct scraping
# from Actions IPs (datacenter IPs get blocked instantly). Cron here can be
# delayed up to ~1h under load; fine for a daily report.
name: daily-run

on:
  schedule:
    - cron: "30 10 * * *"   # 10:30 UTC ≈ 06:30 Eastern / 13:30 Israel
  workflow_dispatch: {}      # manual trigger for testing

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pipeline.orchestrator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          KEEPA_KEY: ${{ secrets.KEEPA_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
